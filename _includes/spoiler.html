<details style="border: 1px solid var(--border-color); border-radius: 8px; margin: 1rem 0; padding: 0;">
  <summary style="padding: 0.85rem 1.2rem 0.85rem 0; font-weight: 700; cursor: pointer; list-style: none; display: flex; align-items: center; justify-content: space-between; color: var(--heading-color);">
    {{ include.title }}
  </summary>
  <div style="
    margin: 0;
    padding: 0.75rem 1.2rem 0.75rem 1.5rem;
    border-left: 4px solid var(--link-color);
    border-top: 1px solid var(--border-color);
    font-style: italic;
    color: var(--text-muted-color);
    line-height: 1.7;
    font-size: 0.92rem;
  ">
    {{ include.abstract }}
  </div>
</details>
